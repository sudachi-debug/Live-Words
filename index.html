<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Live Words Pro</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #111, #000);
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont;
  overflow: hidden;
}

/* 上部UI */
#controls {
  position: fixed;
  top: 10px;
  left: 10px;
  right: 10px;
  display: flex;
  gap: 10px;
  z-index: 9999;
}

button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: rgba(255,255,255,0.1);
  color: #fff;
  backdrop-filter: blur(10px);
  font-size: 16px;
}

/* ワード */
.word {
  position: absolute;
  font-weight: bold;
  animation: flow 6s linear forwards;
  text-shadow: 0 0 10px rgba(255,255,255,0.6);
}

@keyframes flow {
  from { right: -120px; opacity: 1; }
  to { right: 110%; opacity: 0; }
}

/* 共起表示 */
#network {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-height: 35%;
  overflow-y: auto;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  font-size: 12px;
  padding: 10px;
  display: none;
}

.pair {
  margin-bottom: 4px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div id="controls">
  <button id="startBtn">開始</button>
  <button id="toggleBtn">共起</button>
</div>

<div id="network"></div>

<script>
const startBtn = document.getElementById("startBtn");
const toggleBtn = document.getElementById("toggleBtn");
const networkDiv = document.getElementById("network");

let recognition;
let networkOn = false;
let co = {};
let history = [];

startBtn.addEventListener("click", () => {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();

  recognition.lang = 'ja-JP';
  recognition.continuous = true;

  recognition.onresult = (event) => {
    const text = event.results[event.results.length - 1][0].transcript;

    const words = text.split(/[\s、。]+/);

    words.forEach(word => {
      if (!word) return;

      showWord(word);
      updateCo(word);
    });

    if (networkOn) drawNetwork();
  };

  recognition.start();
});

toggleBtn.addEventListener("click", () => {
  networkOn = !networkOn;
  networkDiv.style.display = networkOn ? "block" : "none";
});

function showWord(word) {
  const el = document.createElement("div");
  el.className = "word";
  el.innerText = word;

  el.style.top = Math.random()*75 + "%";
  el.style.fontSize = (18 + Math.random()*22) + "px";
  el.style.color = `hsl(${Math.random()*360}, 90%, 65%)`;

  document.body.appendChild(el);
  setTimeout(() => el.remove(), 6000);
}

function updateCo(word) {
  history.forEach(prev => {
    const key = prev + " - " + word;
    co[key] = (co[key] || 0) + 1;
  });

  history.push(word);
  if (history.length > 4) history.shift();
}

function drawNetwork() {
  networkDiv.innerHTML = "";

  Object.entries(co)
    .sort((a,b)=>b[1]-a[1])
    .slice(0, 20)
    .forEach(([k,v])=>{
      const div = document.createElement("div");
      div.className = "pair";
      div.innerText = k + " (" + v + ")";
      networkDiv.appendChild(div);
    });
}
</script>

</body>
</html>
