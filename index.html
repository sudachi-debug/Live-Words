<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リアルタイム ワード可視化</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f8f9fb;
  overflow: hidden;
}

#ui {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 10;
}

button {
  font-size: 16px;
  padding: 10px;
  margin-right: 5px;
}

canvas {
  display: block;
}
</style>
</head>

<body>

<div id="ui">
  <button onclick="start()">開始</button>
  <button onclick="stop()">停止</button>
  <button onclick="toggleMode()">モード切替</button>
</div>

<canvas id="canvas"></canvas>

<script src="script.js"></script>
</body>
</html>
