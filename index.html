<!DOCTYPE html><html lang="ja"><head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE WORDS</title><style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
  * { box-sizing: border-box; }
body { margin: 0; background: #060d1a; font-family: 'Noto Sans JP', sans-serif; overflow: hidden; }
#ui { position: fixed; top: 16px; left: 16px; z-index: 20; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
#statusBadge { display: flex; align-items: center; gap: 8px; background: rgba(6, 13, 26, 0.75); backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.08); border-radius: 999px; padding: 8px 16px; color: rgba(255,255,255,0.85); font-size: 13px; font-weight: 500; min-width: 160px; }
#dot { width: 9px; height: 9px; border-radius: 50%; background: #555; transition: background 0.3s; }
#dot.active { background: #00e676; box-shadow: 0 0 8px #00e676, 0 0 20px #00e67688; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
#btnGroup, #btnGroup2 { display: flex; gap: 6px; background: rgba(6, 13, 26, 0.75); backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 6px; }
button { border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; color: white; cursor: pointer; transition: 0.1s; font-family: inherit; }
button:active { transform: scale(0.96); }
.start { background: linear-gradient(135deg,#00c853,#00e676); }
.stop { background: linear-gradient(135deg,#d50000,#ff1744); }
.toggle { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); }
.toggle.active { background: linear-gradient(135deg,#1565c0,#2979ff); border-color: transparent; }
#fileBtn { background: linear-gradient(135deg,#6a1b9a,#ab47bc); border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; color: white; cursor: pointer; display: inline-block; }
#speedControl { display: flex; align-items: center; gap: 8px; background: rgba(6, 13, 26, 0.75); backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 8px 14px; color: rgba(255,255,255,0.6); font-size: 12px; }
canvas { display: block; }
canvas.clickable { cursor: pointer; }

/* 文章表示用モーダル */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); z-index: 100; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: rgba(10,20,40,0.97); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 28px; width: min(560px, 92vw); max-height: 80vh; display: flex; flex-direction: column; gap: 16px; color: white; }
.modal-body { overflow-y: auto; flex: 1; }
.context-item { margin-bottom: 14px; padding: 14px; background: rgba(255,255,255,0.03); border-radius: 8px; font-size: 14px; line-height: 1.6; border-left: 3px solid #2979ff; }
.highlight { color: #ff5252; font-weight: 700; background: rgba(255,82,82,0.1); padding: 0 2px; }
#logo { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 13px; font-weight: 600; letter-spacing: 0.2em; color: rgba(255,255,255,0.12); pointer-events: none; }
</style></head><body>

<div id="ui">
  <div id="statusBadge"><span id="dot"></span><span id="statusText">停止中</span></div>
  <div id="btnGroup">
    <button class="start" onclick="start()">開始</button>
    <button class="stop" onclick="stop()">停止</button>
    <button class="toggle" id="toggleBtn" onclick="toggleMode()">共起ON</button>
  </div>
  <div id="btnGroup2">
    <label id="fileBtn">ファイル解析<input type="file" onchange="loadFile(event)" style="display:none;"></label>
    <button class="toggle" style="background:rgba(255,255,255,0.1)" onclick="clearAll()">クリア</button>
  </div>
  <div id="speedControl">
    速度 <input type="range" id="speedSlider" min="0.5" max="5" step="0.5" value="2">
    個数 <input type="range" id="wordSlider" min="5" max="40" value="15">
  </div>
</div>

<div id="contextOverlay" class="overlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <h2 id="contextTitle" style="margin:0;font-size:18px;">出現箇所</h2>
    <div class="modal-body" id="contextBody"></div>
    <button onclick="document.getElementById('contextOverlay').classList.remove('open')" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; padding:10px; border-radius:8px; cursor:pointer;">閉じる</button>
  </div>
</div>

<div id="logo">LIVE WORDS v0.12.200</div>
<canvas id="canvas"></canvas>

<script>
const COLORS = ["#00e5ff","#69f0ae","#ffd740","#ff5252","#b388ff"];
let words = {}, edges = {}, flow = [], networkNodes = [];
let mode = "flow", running = false, isFileMode = false;
let sourceSentences = [], wordToSentenceMap = {};
let recognition;

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.onresize = resize; resize();

function extractWords(text) {
  return text.split(/[、。！？\s]+|[はがをにでもと]/).map(w => w.trim()).filter(w => w.length >= 2);
}

function processText(text) {
  const tokens = extractWords(text);
  tokens.forEach(w => {
    if(!words[w]) words[w] = {count:0, weight:0, group:Math.floor(Math.random()*5)};
    words[w].count++;
    words[w].weight = words[w].count; 
    if (!flow.some(f => f.text === w)) {
      flow.push({text: w, x: canvas.width, y: 100 + Math.random() * (canvas.height - 200), size: 16, group: words[w].group, opacity: 0});
    }
  });
  for(let i=0; i<tokens.length; i++){
    for(let j=i+1; j<tokens.length; j++){
      const k = tokens[i] < tokens[j] ? tokens[i]+"*"+tokens[j] : tokens[j]+"*"+tokens[i];
      edges[k] = (edges[k]||0) + 1;
    }
  }
}

function start() {
  if(running) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return alert("非対応ブラウザ");
  recognition = new SR();
  recognition.lang = "ja-JP"; recognition.continuous = true; recognition.interimResults = true;
  recognition.onresult = (e) => {
    for(let i=e.resultIndex; i<e.results.length; i++) {
      if(e.results[i].isFinal) processText(e.results[i][0].transcript);
    }
  };
  recognition.onend = () => { if(running) recognition.start(); };
  recognition.start(); running = true; updateUI();
}
function stop() { running = false; if(recognition) recognition.stop(); updateUI(); }

function updateUI() {
  document.getElementById("dot").className = running ? "active" : "";
  document.getElementById("statusText").textContent = running ? "Listening..." : "停止中";
  document.getElementById("toggleBtn").className = mode === "network" ? "toggle active" : "toggle";
}

function toggleMode() { mode = mode === "flow" ? "network" : "flow"; updateUI(); }

function draw() {
  ctx.fillStyle = "#060d1a"; ctx.fillRect(0,0,canvas.width,canvas.height);
  const speed = parseFloat(document.getElementById("speedSlider").value);
  flow.forEach((f, i) => {
    f.x -= speed; f.opacity = Math.min(1, f.opacity + 0.05);
    const targetSize = 16 + (words[f.text]?.weight || 0) * 3;
    f.size += (targetSize - f.size) * 0.1;
    ctx.globalAlpha = f.opacity * (mode === "flow" ? 1 : 0.2);
    ctx.fillStyle = COLORS[f.group];
    ctx.font = `bold ${f.size}px 'Noto Sans JP'`;
    ctx.fillText(f.text, f.x, f.y);
    if (f.x < -200) flow.splice(i, 1);
  });
  ctx.globalAlpha = 1;
  if (mode === "network") drawNetwork();
  requestAnimationFrame(draw);
}

function drawNetwork() {
  const maxW = parseInt(document.getElementById("wordSlider").value);
  const sorted = Object.entries(words).sort((a,b) => b[1].weight - a[1].weight).slice(0, maxW);
  const cx = canvas.width/2, cy = canvas.height/2, r = Math.min(cx, cy) * 0.7;
  networkNodes = sorted.map(([text, data], i) => {
    const angle = (i / sorted.length) * Math.PI * 2;
    return { text, x: cx + Math.cos(angle)*r, y: cy + Math.sin(angle)*r, size: 20 + data.weight*4, color: COLORS[data.group] };
  });
  ctx.strokeStyle = "rgba(255,255,255,0.1)";
  networkNodes.forEach((n1, i) => {
    networkNodes.slice(i+1).forEach(n2 => {
      const k = n1.text < n2.text ? n1.text+"*"+n2.text : n2.text+"*"+n1.text;
      if (edges[k]) { ctx.lineWidth = Math.min(5, edges[k]); ctx.beginPath(); ctx.moveTo(n1.x, n1.y); ctx.lineTo(n2.x, n2.y); ctx.stroke(); }
    });
  });
  networkNodes.forEach(n => {
    ctx.fillStyle = n.color; ctx.font = `bold ${n.size}px 'Noto Sans JP'`; ctx.textAlign = "center";
    ctx.shadowBlur = 15; ctx.shadowColor = n.color; ctx.fillText(n.text, n.x, n.y); ctx.shadowBlur = 0;
  });
}

function loadFile(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const text = ev.target.result; isFileMode = true;
    sourceSentences = text.split(/[。！？\n]+/).filter(s => s.length > 1);
    words = {}; edges = {}; wordToSentenceMap = {};
    sourceSentences.forEach((s, idx) => {
      const tokens = extractWords(s);
      tokens.forEach(t => {
        if(!words[t]) words[t] = {count:0, weight:0, group:Math.floor(Math.random()*5)};
        words[t].count++; words[t].weight = words[t].count;
        if(!wordToSentenceMap[t]) wordToSentenceMap[t] = new Set();
        wordToSentenceMap[t].add(idx);
      });
      for(let i=0; i<tokens.length; i++) {
        for(let j=i+1; j<tokens.length; j++) {
          const k = tokens[i] < tokens[j] ? tokens[i]+"*"+tokens[j] : tokens[j]+"*"+tokens[i];
          edges[k] = (edges[k]||0)+1;
        }
      }
    });
    mode = "network"; updateUI();
  };
  reader.readAsText(file);
}

canvas.onclick = (e) => {
  if (!isFileMode || mode !== "network") return;
  const hit = networkNodes.find(n => Math.hypot(n.x - e.clientX, n.y - (e.clientY - 10)) < 40);
  if (hit) {
    const idxs = wordToSentenceMap[hit.text];
    document.getElementById("contextTitle").textContent = `「${hit.text}」の出現箇所`;
    document.getElementById("contextBody").innerHTML = Array.from(idxs).map(i => 
      `<div class="context-item">${sourceSentences[i].replace(hit.text, `<span class="highlight">${hit.text}</span>`)}</div>`
    ).join("");
    document.getElementById("contextOverlay").classList.add("open");
  }
};

function clearAll() { words={}; edges={}; flow=[]; isFileMode=false; sourceSentences=[]; wordToSentenceMap={}; updateUI(); }
draw();
</script></body></html>
