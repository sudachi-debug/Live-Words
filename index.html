<!DOCTYPE html><html lang="ja"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE WORDS v0.11.100</title><style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
  * { box-sizing: border-box; }
  body { margin: 0; background: #060d1a; font-family: 'Noto Sans JP', sans-serif; overflow: hidden; color: #fff; }

  /* 画面上部の操作エリア */
  #header {
    position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
    padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    background: linear-gradient(to bottom, rgba(6,13,26,0.9) 0%, rgba(6,13,26,0) 100%);
    pointer-events: none;
  }
  #header > * { pointer-events: auto; }

  /* ステータスバッジ */
  .badge {
    display: flex; align-items: center; gap: 8px;
    background: rgba(20, 30, 50, 0.8); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 999px;
    padding: 8px 16px; font-size: 13px; font-weight: 700;
  }
  #dot { width: 10px; height: 10px; border-radius: 50%; background: #444; }
  #dot.active { background: #00e676; box-shadow: 0 0 10px #00e676; animation: blink 1.5s infinite; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* コントロールグループ */
  .control-panel {
    display: flex; align-items: center; gap: 6px;
    background: rgba(20, 30, 50, 0.8); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 4px;
  }

  button {
    border: none; border-radius: 8px; padding: 8px 14px;
    font-size: 12px; font-weight: 700; font-family: inherit;
    cursor: pointer; transition: 0.2s; color: #fff;
  }
  button:active { transform: scale(0.92); }
  
  .btn-main { background: linear-gradient(135deg, #00c853, #00e676); }
  .btn-stop { background: #d50000; }
  .btn-sub  { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); }
  .btn-sub.active { background: #2979ff; border-color: transparent; }
  .btn-file { background: #6a1b9a; }

  /* スライダーエリア */
  .slider-unit { display: flex; align-items: center; gap: 8px; padding: 0 10px; font-size: 11px; color: rgba(255,255,255,0.6); }
  input[type="range"] { width: 60px; accent-color: #2979ff; cursor: pointer; }

  canvas { display: block; }
  canvas.clickable { cursor: pointer; }

  /* モーダル */
  .overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px); z-index: 200; align-items: center; justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal {
    background: #0d1b2a; border: 1px solid #2979ff44; border-radius: 20px;
    padding: 30px; width: 90%; max-width: 650px; max-height: 80vh;
    display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }
  .modal-body { overflow-y: auto; flex: 1; margin: 20px 0; }
  .context-item {
    background: rgba(255,255,255,0.03); margin-bottom: 10px; padding: 15px;
    border-radius: 10px; font-size: 14px; line-height: 1.6; border-left: 4px solid #2979ff;
  }
  .highlight { color: #00e5ff; font-weight: 900; background: rgba(0,229,255,0.1); padding: 0 4px; border-radius: 4px; }

  #logo {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.15); font-size: 11px; font-weight: 700; letter-spacing: 0.3em;
  }
</style></head><body>

<div id="header">
  <div class="badge"><span id="dot"></span><span id="statusText">STANDBY</span></div>
  
  <div class="control-panel">
    <button class="btn-main" id="startBtn" onclick="start()">開始</button>
    <button class="btn-stop" onclick="stop()">停止</button>
    <button class="btn-sub" id="modeBtn" onclick="toggleMode()">共起図 OFF</button>
    <button class="btn-sub" id="flowBtn" onclick="toggleFlow()" style="display:none;">文字流れ ON</button>
  </div>

  <div class="control-panel">
    <label class="btn-file" style="display:inline-block; border-radius:8px; padding:8px 14px; font-size:12px; font-weight:700; cursor:pointer;">
      ファイル解析 <input type="file" accept=".txt" onchange="loadFile(event)" style="display:none;">
    </label>
    <button class="btn-sub" onclick="clearAll()">クリア</button>
  </div>

  <div class="control-panel">
    <div class="slider-unit">速度 <input type="range" id="speedSlider" min="0.5" max="5" step="0.5" value="2"></div>
    <div class="slider-unit">単語数 <input type="range" id="wordSlider" min="5" max="40" value="15"></div>
  </div>
</div>

<div id="contextOverlay" class="overlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <h2 id="ctxTitle" style="margin:0; font-size:20px; color:#00e5ff;"></h2>
    <div class="modal-body" id="ctxBody"></div>
    <button class="btn-sub" onclick="document.getElementById('contextOverlay').classList.remove('open')">閉じる</button>
  </div>
</div>

<div id="logo">LIVE WORDS v0.11.001</div>
<canvas id="canvas"></canvas>

<script>
const COLORS = ["#00e5ff","#69f0ae","#ffd740","#ff5252","#b388ff"];
// 削除対象を厳選し、意味のある語尾（やすい、にくい等）は残す
const STOP_WORDS = ["です","ます","でした","ました","という","あのー","えーと","そのー"];

let words = {}, edges = {}, flow = [], networkNodes = [];
let mode = "flow", flowOnNetwork = true, running = false;
let sourceSentences = [], wordToSentenceMap = {};
let recognition;

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.onresize = resize; resize();

// --- 解析ロジック ---
function extractWords(text) {
  // 重複発話の正規化 (りんごりんご -> りんご)
  let cleanText = text.replace(/([ぁ-んァ-ン一-龥]{2,})\1+/g, "$1");
  
  // 助詞や記号で区切る
  return cleanText.split(/[、。！？!?\s]+|[はがをにでもと]/)
    .map(w => w.trim())
    .filter(w => {
      if (w.length < 2) return false;
      if (STOP_WORDS.includes(w)) return false;
      // 1文字のひらがな（意味が消失したもの）を除外
      if (/^[ぁ-ん]$/.test(w)) return false;
      return true;
    });
}

function processText(text) {
  const tokens = extractWords(text);
  tokens.forEach(w => {
    if(!words[w]) words[w] = {count:0, weight:0, group:Math.floor(Math.random()*5)};
    words[w].count++;
    words[w].weight = words[w].count; 
    
    // 流れ文字の追加（既存になければ追加）
    if (!flow.some(f => f.text === w)) {
      flow.push({
        text: w, x: canvas.width + 50, y: 150 + Math.random() * (canvas.height - 300),
        size: 16, group: words[w].group, opacity: 0
      });
    }
  });
  
  // 共起関係
  for(let i=0; i<tokens.length; i++){
    for(let j=i+1; j<tokens.length; j++){
      const k = tokens[i] < tokens[j] ? tokens[i]+"*"+tokens[j] : tokens[j]+"*"+tokens[i];
      edges[k] = (edges[k]||0) + 1;
    }
  }
}

// --- 音声認識 ---
function start() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return alert("Speech Recognition not supported.");
  recognition = new SR();
  recognition.lang = "ja-JP"; recognition.continuous = true; recognition.interimResults = true;
  recognition.onresult = (e) => {
    for(let i=e.resultIndex; i<e.results.length; i++) {
      if(e.results[i].isFinal) processText(e.results[i][0].transcript);
    }
  };
  recognition.onend = () => { if(running) recognition.start(); };
  recognition.start(); running = true; updateUI();
}
function stop() { running = false; if(recognition) recognition.stop(); updateUI(); }

function updateUI() {
  document.getElementById("dot").className = running ? "active" : "";
  document.getElementById("statusText").textContent = running ? "LISTENING" : "STANDBY";
  const mBtn = document.getElementById("modeBtn");
  mBtn.textContent = mode === "network" ? "共起図 ON" : "共起図 OFF";
  mBtn.className = mode === "network" ? "btn-sub active" : "btn-sub";
  document.getElementById("flowBtn").style.display = mode === "network" ? "block" : "none";
}

function toggleMode() { mode = mode === "flow" ? "network" : "flow"; updateUI(); }
function toggleFlow() { 
  flowOnNetwork = !flowOnNetwork; 
  document.getElementById("flowBtn").className = flowOnNetwork ? "btn-sub active" : "btn-sub";
}

// --- 描画ループ ---
function draw() {
  ctx.fillStyle = "#060d1a"; ctx.fillRect(0,0,canvas.width,canvas.height);
  const speedSetting = parseFloat(document.getElementById("speedSlider").value);

  // 文字流れ
  flow.forEach((f, i) => {
    f.x -= speedSetting;
    f.opacity = Math.min(1, f.opacity + 0.04);
    // スコアに応じてサイズを動的に計算
    const targetSize = 16 + Math.sqrt(words[f.text]?.weight || 1) * 8;
    f.size += (targetSize - f.size) * 0.1;

    let drawAlpha = f.opacity;
    if (mode === "network") drawAlpha *= (flowOnNetwork ? 0.25 : 0);

    ctx.globalAlpha = drawAlpha;
    ctx.fillStyle = COLORS[f.group];
    ctx.font = `900 ${Math.round(f.size)}px 'Noto Sans JP'`;
    ctx.fillText(f.text, f.x, f.y);
    if (f.x < -300) flow.splice(i, 1);
  });
  ctx.globalAlpha = 1;

  if (mode === "network") drawNetwork();
  requestAnimationFrame(draw);
}

function drawNetwork() {
  const limit = parseInt(document.getElementById("wordSlider").value);
  const sorted = Object.entries(words).sort((a,b) => b[1].weight - a[1].weight).slice(0, limit);
  
  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;
  const radius = Math.min(centerX, centerY) * 0.7;

  networkNodes = sorted.map(([text, data], i) => {
    const angle = (i / sorted.length) * Math.PI * 2;
    return {
      text, x: centerX + Math.cos(angle) * radius, y: centerY + Math.sin(angle) * radius,
      size: 18 + Math.sqrt(data.weight) * 10, color: COLORS[data.group]
    };
  });

  // エッジ（線）
  ctx.strokeStyle = "rgba(255,255,255,0.08)";
  networkNodes.forEach((n1, i) => {
    networkNodes.slice(i+1).forEach(n2 => {
      const pair = n1.text < n2.text ? n1.text+"*"+n2.text : n2.text+"*"+n1.text;
      if (edges[pair]) {
        ctx.lineWidth = Math.min(6, edges[pair]);
        ctx.beginPath(); ctx.moveTo(n1.x, n1.y); ctx.lineTo(n2.x, n2.y); ctx.stroke();
      }
    });
  });

  // ノード（単語）
  networkNodes.forEach(n => {
    ctx.shadowBlur = 15; ctx.shadowColor = n.color;
    ctx.fillStyle = n.color;
    ctx.font = `900 ${Math.round(n.size)}px 'Noto Sans JP'`;
    ctx.textAlign = "center";
    ctx.fillText(n.text, n.x, n.y);
    ctx.shadowBlur = 0;
  });
}

// --- ファイル解析 ---
function loadFile(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const text = ev.target.result;
    clearAll();
    sourceSentences = text.split(/[。！？\n]+/).filter(s => s.trim().length > 1);
    sourceSentences.forEach((s, idx) => {
      const tokens = extractWords(s);
      tokens.forEach(t => {
        if(!words[t]) words[t] = {count:0, weight:0, group:Math.floor(Math.random()*5)};
        words[t].count++; words[t].weight = words[t].count;
        if(!wordToSentenceMap[t]) wordToSentenceMap[t] = new Set();
        wordToSentenceMap[t].add(idx);
      });
      // ファイル全体の共起も計算
      for(let i=0; i<tokens.length; i++){
        for(let j=i+1; j<tokens.length; j++){
          const k = tokens[i] < tokens[j] ? tokens[i]+"*"+tokens[j] : tokens[j]+"*"+tokens[i];
          edges[k] = (edges[k]||0) + 1;
        }
      }
    });
    mode = "network"; updateUI();
  };
  reader.readAsText(file);
}

// --- 単語クリック（文脈表示） ---
canvas.onclick = (e) => {
  if (mode !== "network") return;
  const hit = networkNodes.find(n => Math.hypot(n.x - e.clientX, n.y - (e.clientY - 10)) < 40);
  if (hit) {
    const idxs = wordToSentenceMap[hit.text];
    if (!idxs) return;
    document.getElementById("ctxTitle").textContent = `「${hit.text}」の出現コンテキスト`;
    document.getElementById("ctxBody").innerHTML = Array.from(idxs).map(i => 
      `<div class="context-item">${sourceSentences[i].replace(new RegExp(hit.text, 'g'), `<span class="highlight">${hit.text}</span>`)}</div>`
    ).join("");
    document.getElementById("contextOverlay").classList.add("open");
  }
};

function clearAll() {
  words={}; edges={}; flow=[]; sourceSentences=[]; wordToSentenceMap={};
  if(!running) updateUI();
}

draw();
</script></body></html>
