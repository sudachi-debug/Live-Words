<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Words Pro</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  overflow: hidden;
}

/* UI */
#ui {
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 10;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  padding: 12px;
  border-radius: 14px;
  color: white;
}

button {
  border: none;
  border-radius: 10px;
  padding: 10px;
  margin: 3px;
  font-size: 14px;
  color: white;
}

.start { background: #00c853; }
.stop { background: #ff5252; }
.toggle { background: #2979ff; }

#status { font-size: 12px; margin-top: 5px; }
#modeLabel { font-size: 13px; margin-top: 5px; }

canvas { display:block; }
</style>
</head>

<body>

<div id="ui">
  <button class="start" onclick="start()">開始</button>
  <button class="stop" onclick="stop()">停止</button>
  <button class="toggle" onclick="toggleMode()">モード切替</button>

  <div id="modeLabel">モード：フロー</div>
  <div id="status">停止中</div>
</div>

<canvas id="canvas"></canvas>

<script src="script.js"></script>
</body>
</html>
