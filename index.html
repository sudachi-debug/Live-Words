<!DOCTYPE html><html lang="ja"><head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE WORDS v0.11.000</title><style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
  * { box-sizing: border-box; }
body { margin: 0; background: #060d1a; font-family: 'Noto Sans JP', sans-serif; overflow: hidden; }
#ui { position: fixed; top: 16px; left: 16px; z-index: 20; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
#statusBadge { display: flex; align-items: center; gap: 8px; background: rgba(6, 13, 26, 0.75); backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.08); border-radius: 999px; padding: 8px 16px; color: rgba(255,255,255,0.85); font-size: 13px; font-weight: 500; min-width: 160px; }
#dot { width: 9px; height: 9px; border-radius: 50%; background: #555; transition: background 0.3s; }
#dot.active { background: #00e676; box-shadow: 0 0 8px #00e676; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
#controls { display: flex; gap: 10px; align-items: center; }
#btnGroup, #btnGroup2, #speedControl { display: flex; gap: 6px; background: rgba(6, 13, 26, 0.75); backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 6px; color: #ccc; font-size: 12px; align-items: center; }
button { border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; color: white; cursor: pointer; transition: 0.1s; }
button:active { transform: scale(0.95); }
.start { background: linear-gradient(135deg,#00c853,#00e676); }
.stop { background: linear-gradient(135deg,#d50000,#ff1744); }
.toggle { background: rgba(255,255,255,0.1); }
.toggle.active { background: linear-gradient(135deg,#1565c0,#2979ff); }
input[type="range"] { width: 70px; }
canvas { display: block; }
canvas.clickable { cursor: pointer; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); z-index: 100; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: #0a1428; border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; padding: 24px; width: 90%; max-width: 600px; max-height: 80vh; display: flex; flex-direction: column; }
.modal-body { overflow-y: auto; flex: 1; margin: 15px 0; color: #fff; }
.context-item { padding: 10px; border-bottom: 1px solid #222; font-size: 14px; line-height: 1.6; }
.highlight { color: #00e5ff; font-weight: bold; background: rgba(0,229,255,0.1); padding: 0 2px; }
#logo { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.1); font-size: 12px; letter-spacing: 2px; }
</style></head><body>

<div id="ui">
  <div id="statusBadge"><span id="dot"></span><span id="statusText">停止中</span></div>
  <div id="controls">
    <div id="btnGroup">
      <button class="start" onclick="start()">開始</button>
      <button class="stop" onclick="stop()">停止</button>
      <button class="toggle" id="modeBtn" onclick="toggleMode()">共起ON</button>
      <button class="toggle" id="flowBtn" onclick="toggleFlow()" style="display:none;">文字流れON</button>
    </div>
    <div id="btnGroup2">
      <label style="cursor:pointer;padding:8px 12px;background:#6a1b9a;border-radius:8px;font-size:13px;font-weight:600;color:white;">
        解析 <input type="file" accept=".txt" onchange="loadFile(event)" style="display:none;">
      </label>
      <button style="background:rgba(255,255,255,0.1)" onclick="clearAll()">クリア</button>
    </div>
    <div id="speedControl">
      速度 <input type="range" id="speedSlider" min="0.5" max="5" step="0.5" value="2">
      量 <input type="range" id="wordSlider" min="5" max="40" value="15">
    </div>
  </div>
</div>

<div id="contextOverlay" class="overlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <h2 id="ctxTitle" style="color:#00e5ff;margin:0;font-size:18px;"></h2>
    <div class="modal-body" id="ctxBody"></div>
    <button onclick="document.getElementById('contextOverlay').classList.remove('open')" style="background:#333">閉じる</button>
  </div>
</div>

<div id="logo">LIVE WORDS v0.11.000</div>
<canvas id="canvas"></canvas>

<script>
const COLORS = ["#00e5ff","#69f0ae","#ffd740","#ff5252","#b388ff"];
const STOP_WORDS = ["です","ます","ので","から","こと","もの","ため","よう","とき","ところ","あと"];

let words = {}, edges = {}, flow = [], networkNodes = [];
let mode = "flow", flowOnNetwork = false, running = false;
let sourceSentences = [], wordToSentenceMap = {};
let recognition;

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.onresize = resize; resize();

// --- 解析ロジック (不具合修正版) ---
function extractWords(text) {
  // 1. 重複（りんごりんご）の正規化
  const normalized = text.replace(/([ぁ-んァ-ン一-龥]{2,})\1+/g, "$1");
  
  // 2. 簡易分割（句読点と助詞で切るが、語尾を削りすぎない）
  return normalized.split(/[、。！？\s]+|[はがをにでもと]/)
    .map(w => w.trim())
    .filter(w => {
      if (w.length < 2) return false;
      if (STOP_WORDS.includes(w)) return false;
      // 「〜やすい」「〜こと」などの重要語尾が1文字で残らないようチェック
      if (/^[ぁ-ん]{1,2}$/.test(w)) return false; 
      return true;
    });
}

function processText(text) {
  const tokens = extractWords(text);
  tokens.forEach(w => {
    if(!words[w]) words[w] = {count:0, weight:0, group:Math.floor(Math.random()*5)};
    words[w].count++;
    words[w].weight = words[w].count; // ここで重みが増える＝サイズが大きくなる
    
    // 流れ文字の追加
    if (!flow.some(f => f.text === w)) {
      flow.push({
        text: w, x: canvas.width, y: 100 + Math.random() * (canvas.height - 200),
        size: 14, group: words[w].group, opacity: 0
      });
    }
  });
  
  // 共起関係
  for(let i=0; i<tokens.length; i++){
    for(let j=i+1; j<tokens.length; j++){
      const k = tokens[i] < tokens[j] ? tokens[i]+"*"+tokens[j] : tokens[j]+"*"+tokens[i];
      edges[k] = (edges[k]||0) + 1;
    }
  }
}

// --- 音声認識 ---
function start() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return alert("非対応ブラウザ");
  recognition = new SR();
  recognition.lang = "ja-JP"; recognition.continuous = true; recognition.interimResults = true;
  recognition.onresult = (e) => {
    for(let i=e.resultIndex; i<e.results.length; i++) {
      if(e.results[i].isFinal) processText(e.results[i][0].transcript);
    }
  };
  recognition.start(); running = true; updateUI();
}
function stop() { if(recognition) recognition.stop(); running = false; updateUI(); }

function updateUI() {
  document.getElementById("dot").className = running ? "active" : "";
  document.getElementById("statusText").textContent = running ? "Listening..." : "停止中";
  document.getElementById("modeBtn").className = mode === "network" ? "toggle active" : "toggle";
  document.getElementById("flowBtn").style.display = mode === "network" ? "block" : "none";
}

function toggleMode() { mode = mode === "flow" ? "network" : "flow"; updateUI(); }
function toggleFlow() { flowOnNetwork = !flowOnNetwork; document.getElementById("flowBtn").className = flowOnNetwork ? "toggle active" : "toggle"; }

// --- 描画ロジック ---
function draw() {
  ctx.fillStyle = "#060d1a"; ctx.fillRect(0,0,canvas.width,canvas.height);
  const speed = parseFloat(document.getElementById("speedSlider").value);

  // 文字流れの更新・描画
  flow.forEach((f, i) => {
    f.x -= speed; f.opacity = Math.min(1, f.opacity + 0.05);
    // 単語の現在のカウントに合わせてサイズを膨らませる
    const targetSize = 14 + (words[f.text]?.weight || 0) * 2;
    f.size += (targetSize - f.size) * 0.1;

    ctx.globalAlpha = f.opacity * (mode === "flow" ? 1 : (flowOnNetwork ? 0.3 : 0));
    ctx.fillStyle = COLORS[f.group];
    ctx.font = `bold ${f.size}px 'Noto Sans JP'`;
    ctx.fillText(f.text, f.x, f.y);
    if (f.x < -200) flow.splice(i, 1);
  });
  ctx.globalAlpha = 1;

  if (mode === "network") drawNetwork();
  requestAnimationFrame(draw);
}

function drawNetwork() {
  const maxWords = parseInt(document.getElementById("wordSlider").value);
  const sorted = Object.entries(words).sort((a,b) => b[1].weight - a[1].weight).slice(0, maxWords);
  
  networkNodes = sorted.map(([text, data], i) => {
    const angle = (i / sorted.length) * Math.PI * 2;
    const r = Math.min(canvas.width, canvas.height) * 0.35;
    return {
      text, x: canvas.width/2 + Math.cos(angle)*r, y: canvas.height/2 + Math.sin(angle)*r,
      size: 16 + data.weight * 3, color: COLORS[data.group]
    };
  });

  // 線
  ctx.strokeStyle = "rgba(255,255,255,0.1)";
  networkNodes.forEach((n1, i) => {
    networkNodes.slice(i+1).forEach(n2 => {
      const pair = n1.text < n2.text ? n1.text+"*"+n2.text : n2.text+"*"+n1.text;
      if (edges[pair]) {
        ctx.lineWidth = Math.min(5, edges[pair]);
        ctx.beginPath(); ctx.moveTo(n1.x, n1.y); ctx.lineTo(n2.x, n2.y); ctx.stroke();
      }
    });
  });

  // 円と文字
  networkNodes.forEach(n => {
    ctx.fillStyle = n.color;
    ctx.font = `bold ${n.size}px 'Noto Sans JP'`;
    ctx.textAlign = "center";
    ctx.shadowBlur = 10; ctx.shadowColor = n.color;
    ctx.fillText(n.text, n.x, n.y);
    ctx.shadowBlur = 0;
  });
}

// --- ファイル連携 & クリック ---
function loadFile(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const text = ev.target.result;
    sourceSentences = text.split(/[。！？\n]+/).filter(s => s.length > 1);
    wordToSentenceMap = {}; words = {}; edges = {};
    sourceSentences.forEach((s, idx) => {
      const tokens = extractWords(s);
      tokens.forEach(t => {
        if(!words[t]) words[t] = {count:0, weight:0, group:Math.floor(Math.random()*5)};
        words[t].count++; words[t].weight = words[t].count;
        if(!wordToSentenceMap[t]) wordToSentenceMap[t] = new Set();
        wordToSentenceMap[t].add(idx);
      });
      processText(s); // 共起計算
    });
    mode = "network"; updateUI();
  };
  reader.readAsText(file);
}

canvas.onclick = (e) => {
  if (mode !== "network") return;
  const hit = networkNodes.find(n => Math.hypot(n.x - e.clientX, n.y - e.clientY) < 30);
  if (hit) {
    const idxs = wordToSentenceMap[hit.text];
    if (!idxs) return;
    document.getElementById("ctxTitle").textContent = `「${hit.text}」を含む文`;
    document.getElementById("ctxBody").innerHTML = Array.from(idxs).map(i => 
      `<div class="context-item">${sourceSentences[i].replace(hit.text, `<span class="highlight">${hit.text}</span>`)}</div>`
    ).join("");
    document.getElementById("contextOverlay").classList.add("open");
  }
};

function clearAll() { words={}; edges={}; flow=[]; sourceSentences=[]; wordToSentenceMap={}; }

draw();
</script></body></html>
