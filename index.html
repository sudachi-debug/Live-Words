<!DOCTYPE html><html lang="ja"><head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LIVE WORDS</title><style>

  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

  * { box-sizing: border-box; }

body {

margin: 0;

background: #060d1a;

font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;

overflow: hidden;

}

#ui {

position: fixed;

top: 16px;

left: 16px;

z-index: 20;

display: flex;

align-items: center;

gap: 10px;

flex-wrap: wrap;

}

#statusBadge {

display: flex;

align-items: center;

gap: 8px;

background: rgba(6, 13, 26, 0.75);

backdrop-filter: blur(14px);

border: 1px solid rgba(255,255,255,0.08);

border-radius: 999px;

padding: 8px 16px;

color: rgba(255,255,255,0.85);

font-size: 13px;

font-weight: 500;

letter-spacing: 0.02em;

min-width: 160px;

}

#dot {

width: 9px;

height: 9px;

border-radius: 50%;

background: #555;

flex-shrink: 0;

transition: background 0.3s;

}

#dot.active {

background: #00e676;

box-shadow: 0 0 8px #00e676, 0 0 20px #00e67688;

animation: pulse 2s ease-in-out infinite;

}

@keyframes pulse {

0%,100% { box-shadow: 0 0 8px #00e676, 0 0 20px #00e67688; }

50%      { box-shadow: 0 0 4px #00e676, 0 0 10px #00e67644; }

}

#btnGroup {

display: flex;

gap: 6px;

background: rgba(6, 13, 26, 0.75);

backdrop-filter: blur(14px);

border: 1px solid rgba(255,255,255,0.08);

border-radius: 12px;

padding: 6px;

}

button {

border: none;

border-radius: 8px;

padding: 8px 16px;

font-size: 13px;

font-weight: 600;

font-family: inherit;

color: white;

cursor: pointer;

letter-spacing: 0.03em;

transition: opacity 0.15s, transform 0.1s;

}

button:active { transform: scale(0.96); }

button:hover  { opacity: 0.85; }

.start  { background: linear-gradient(135deg,#00c853,#00e676); }

.stop   { background: linear-gradient(135deg,#d50000,#ff1744); }

.toggle {

background: rgba(255,255,255,0.1);

border: 1px solid rgba(255,255,255,0.15);

}

.toggle.active {

background: linear-gradient(135deg,#1565c0,#2979ff);

border-color: transparent;

}

#logo {

position: fixed;

bottom: 20px;

left: 50%;

transform: translateX(-50%);

font-size: 13px;

font-weight: 600;

letter-spacing: 0.2em;

color: rgba(255,255,255,0.12);

text-transform: uppercase;

pointer-events: none;

z-index: 19;

white-space: nowrap;

}

#btnGroup2 {

display: flex;

gap: 6px;

background: rgba(6, 13, 26, 0.75);

backdrop-filter: blur(14px);

border: 1px solid rgba(255,255,255,0.08);

border-radius: 12px;

padding: 6px;

}

#fileBtn {

border: none;

border-radius: 8px;

padding: 8px 16px;

font-size: 13px;

font-weight: 600;

font-family: inherit;

color: white;

cursor: pointer;

letter-spacing: 0.03em;

background: linear-gradient(135deg,#6a1b9a,#ab47bc);

transition: opacity 0.15s, transform 0.1s;

}

#fileBtn:active { transform: scale(0.96); }

#fileBtn:hover  { opacity: 0.85; }

.clear {

background: rgba(255,255,255,0.1);

border: 1px solid rgba(255,255,255,0.15) !important;

}

#speedControl {

display: flex;

align-items: center;

gap: 8px;

background: rgba(6, 13, 26, 0.75);

backdrop-filter: blur(14px);

border: 1px solid rgba(255,255,255,0.08);

border-radius: 12px;

padding: 8px 14px;

color: rgba(255,255,255,0.6);

font-size: 12px;

font-weight: 500;

}

#speedSlider {

-webkit-appearance: none;

appearance: none;

width: 90px;

height: 4px;

border-radius: 2px;

background: rgba(255,255,255,0.2);

outline: none;

}

#speedSlider::-webkit-slider-thumb {

-webkit-appearance: none;

appearance: none;

width: 14px;

height: 14px;

border-radius: 50%;

background: #2979ff;

cursor: pointer;

box-shadow: 0 0 6px #2979ff88;

}

canvas { display: block; cursor: default; }

canvas.clickable { cursor: pointer; }

.overlay {

display: none;

position: fixed;

inset: 0;

background: rgba(0,0,0,0.6);

backdrop-filter: blur(6px);

z-index: 100;

align-items: center;

justify-content: center;

}

.overlay.open { display: flex; }

.modal {

background: rgba(10,20,40,0.97);

border: 1px solid rgba(255,255,255,0.12);

border-radius: 16px;

padding: 28px;

width: min(680px, 92vw);

max-height: 80vh;

display: flex;

flex-direction: column;

gap: 16px;

}

.modal h2 {

margin: 0;

font-size: 16px;

font-weight: 700;

color: rgba(255,255,255,0.9);

letter-spacing: 0.05em;

}

.modal-body {

overflow-y: auto;

flex: 1;

}

.modal-footer {

display: flex;

gap: 8px;

justify-content: flex-end;

}

.modal-footer button { padding: 8px 18px; font-size: 13px; }

.btn-csv  { background: linear-gradient(135deg,#00838f,#00e5ff); }

.btn-close { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2) !important; }

.btn-setting { background: linear-gradient(135deg,#e65100,#ff9800); }

.btn-reset { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2) !important; font-size:12px; }

#summaryTable table { width:100%; border-collapse:collapse; font-size:13px; }

#summaryTable th {

position: sticky; top: 0;

background: rgba(10,20,40,0.99);

color: rgba(255,255,255,0.5);

font-weight: 600; padding: 8px 10px;

text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1);

}

#summaryTable td { padding:7px 10px; color:rgba(255,255,255,0.85); border-bottom:1px solid rgba(255,255,255,0.05); }

#summaryTable tr:hover td { background:rgba(255,255,255,0.04); }

.boost-badge {

display: inline-block;

font-size: 10px; font-weight: 700;

padding: 2px 7px; border-radius: 999px;

letter-spacing: 0.03em; color: #000;

}

.group-row {

display: flex; align-items: center;

gap: 12px; padding: 10px 4px;

border-bottom: 1px solid rgba(255,255,255,0.06);

}

.group-name { flex: 1; color: rgba(255,255,255,0.85); font-size: 13px; font-weight: 600; }

.group-words { flex: 2; color: rgba(255,255,255,0.35); font-size: 11px; line-height: 1.6; }

.rate-input {

width: 52px; padding: 5px 8px;

background: rgba(255,255,255,0.08);

border: 1px solid rgba(255,255,255,0.15);

border-radius: 6px; color: white;

font-size: 13px; font-weight: 600; font-family: inherit;

text-align: center;

}

.rate-input:focus { outline: none; border-color: #2979ff; }

.rate-label { color: rgba(255,255,255,0.4); font-size: 12px; }

.context-item {

margin-bottom: 12px; padding: 12px;

background: rgba(255,255,255,0.03);

border-radius: 8px; font-size: 14px;

line-height: 1.6; color: rgba(255,255,255,0.85);

border-left: 3px solid #2979ff;

}

.highlight {

background: rgba(41, 121, 255, 0.2);

color: #2979ff; font-weight: 700;

padding: 0 4px; border-radius: 4px;

}

.group-name-btn {

cursor: pointer;

text-decoration: underline;

text-underline-offset: 3px;

text-decoration-style: dotted;

user-select: none;

}

.group-name-btn:hover { opacity: 0.75; }

.word-list-panel {

display: none;

margin: 0 4px 6px 4px;

padding: 10px 12px;

background: rgba(255,255,255,0.04);

border-radius: 8px;

border: 1px solid rgba(255,255,255,0.08);

}

.word-list-panel.open { display: block; }

.word-chips {

display: flex;

flex-wrap: wrap;

gap: 6px;

max-height: 160px;

overflow-y: auto;

}

.word-chip {

display: inline-flex;

align-items: center;

gap: 4px;

padding: 3px 10px;

border-radius: 999px;

font-size: 12px;

font-weight: 500;

background: rgba(255,255,255,0.07);

border: 1px solid rgba(255,255,255,0.12);

color: rgba(255,255,255,0.75);

}

.word-chip.in-list {

border-color: rgba(41,121,255,0.5);

color: #2979ff;

}

.word-chip-add {

cursor: pointer;

font-size: 14px;

line-height: 1;

color: rgba(255,255,255,0.35);

transition: color 0.15s;

}

.word-chip-add:hover { color: #69f0ae; }

.word-chip.in-list .word-chip-add { color: rgba(41,121,255,0.4); cursor: default; }

</style></head><body>

<div id="ui">

  <div style="display:flex;align-items:center;gap:10px;">

    <div id="statusBadge">

      <span id="dot"></span>

      <span id="statusText">停止中</span>

    </div>

    <button id="toggleControls" onclick="toggleControls()">表示</button>

  </div>

  <div id="controls">

    <div id="btnGroup">

      <button class="start" id="startBtn" onclick="start()" disabled>読込中...</button>

      <button class="stop" onclick="stop()">停止</button>

      <button class="toggle" id="toggleBtn" onclick="toggleMode()">共起ON</button>

      <button class="toggle" id="flowToggleBtn" onclick="toggleFlowOnNetwork()" style="display:none;">文字流れON</button>

    </div>

  </div>

</div>

<canvas id="canvas"></canvas>

<script>

/* ====== 完全修正版JS ====== */

const LS_KEY = "livewords_groupRates";

const LS_FLOW_KEY = "livewords_flowOnNetwork";

let mode = "flow";

let running = false;

function start(){

  running = true;

  updateStatus();

}

function stop(){

  running = false;

  updateStatus();

}

function toggleMode(){

  mode = (mode === "flow") ? "network" : "flow";

  updateMode();

}

function toggleControls(){

  const c = document.getElementById("controls");

  if(!c) return;

  c.style.display = (c.style.display === "none") ? "block" : "none";

}

function updateStatus(){

  const dot = document.getElementById("dot");

  const text = document.getElementById("statusText");

  if(!dot || !text) return;

  if(running){

    dot.className = "active";

    text.textContent = "Listening...";

  }else{

    dot.className = "";

    text.textContent = "停止中";

  }

}

function updateMode(){

  const btn = document.getElementById("toggleBtn");

  if(!btn) return;

  if(mode === "flow"){

    btn.textContent = "共起ON";

    btn.classList.remove("active");

  }else{

    btn.textContent = "共起OFF";

    btn.classList.add("active");

  }

}

/* 初期化 */

updateStatus();

updateMode();

</script>

</body></html>
