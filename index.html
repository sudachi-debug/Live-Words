<script>
// ===== 追加状態 =====
let recentWords = {}; // ★追加

// ===== テキスト処理 =====
function processText(text){
let tokens = splitJapanese(text);
let current = [];

tokens.forEach(w=>{
w = w.trim();
if(!w) return;

if(w.length < MIN_WORD_LEN) return;

let { base, count } = extractRepeats(w);
let word = base;

word = cleanWord(word);
if(!word) return;

word = stemWord(word);
if(!word) return;

if(word.length < MIN_WORD_LEN) return;

if(NORMALIZE[word]) word = NORMALIZE[word];
if(STOP_WORDS.includes(word)) return;

// ★時間ベース連続防止
const now = Date.now();
if(recentWords[word] && now - recentWords[word] < 1500){
  return;
}
recentWords[word] = now;

// ★同時表示数制限
let sameCount = flow.filter(f => f.text === word).length;
if(sameCount >= 2) return;

if(!words[word]){
  words[word] = {
    count:0,
    weight:0,
    group: Math.floor(Math.random()*COLORS.length)
  };
}

words[word].count += count;

let boost = BOOST.includes(word) ? 2 : 1;
words[word].weight = words[word].count * boost;

current.push(word);

const threshold = isFileMode ? 3 : MIN_COUNT;
if(words[word].count < threshold) return;

flow.push({
  text:word,
  x:canvas.width,
  y:80 + Math.random()*(canvas.height-120),
  size:12, // ★初期サイズ固定
  targetSize: 10 + words[word].weight*1.2, // ★目標サイズ
  group:words[word].group,
  t:Math.random()*1000,
  opacity:0
});

if(flow.length > 40){
  flow.shift();
}

networkDirty = true;

});

current.forEach(a=>{
current.forEach(b=>{
if(a!==b){
let key=a+"_"+b;
edges[key]=(edges[key]||0)+1;
}
});
});

if(Object.keys(words).length > getMaxWords()){
let sorted = Object.entries(words).sort((a,b)=>a[1].weight-b[1].weight);
delete words[sorted[0][0]];
networkDirty = true;
}
}

// ===== フロー描画 =====
function drawFlow(alpha=1){
const now = Date.now();
const speed = (parseFloat(document.getElementById("speedSlider").value) || 2);

flow.forEach((f,i)=>{

// ===== サイズなめらか成長 =====
f.size += (f.targetSize - f.size) * 0.05;

// ===== フェードイン =====
f.opacity = Math.min(1, (f.opacity||0) + 0.04);

// ===== フェードアウト（左に行くほど薄く）=====
let fadeOut = Math.max(0, f.x / canvas.width); // 右1 → 左0

ctx.globalAlpha = f.opacity * fadeOut * alpha;

ctx.fillStyle = COLORS[f.group];
ctx.font = "600 " + f.size + "px 'Noto Sans JP', sans-serif";

ctx.shadowColor = COLORS[f.group];
ctx.shadowBlur = 18 + Math.sin(now*0.002 + f.t)*6;

ctx.fillText(f.text, f.x, f.y);

f.y += Math.sin(now*0.0015 + f.t)*0.4;
f.x -= speed + f.size*0.04;

// ===== 完全に消えたら削除 =====
if(f.x < -200 || fadeOut <= 0.02){
  if(fileFlowPool.length > 0){
    f.x = canvas.width + Math.random()*200;
    f.y = 120 + Math.random()*(canvas.height - 200);
    f.opacity = 0;
  } else {
    flow.splice(i,1);
  }
}

});

ctx.shadowBlur = 0;
ctx.globalAlpha = 1;
}
</script>
