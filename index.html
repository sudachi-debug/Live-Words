</style></head><body>

    </div>

</div>

<div id="logo">Live Words&nbsp;&nbsp;v0.04.000</div>
<canvas id="canvas"></canvas>
<script>
const COLORS = ["#00e5ff","#69f0ae","#ffd740","#ff5252","#b388ff"];
const STOP_WORDS = [
  "えー","あの","まあ","ちょっと","えっと","なるほど",
  "は","が","を","に","で","と","も","の","へ","や","ね","よ","か","な","けど","から","ので","より","まで","だけ","しか","など","って","たり","ながら",
  "ている","てい","てる","くい","くて","くな","くし","して","した","する","され","なっ","なり","あり","おり","いく","くる","いる","いた","ある","あっ",
  "これ","それ","あれ","この","その","あの","ここ","そこ","あそこ","こと","もの","とき","ところ",
  "そして","また","および","さらに","ただし","なお","つまり","すなわち","したがって","しかし","でも","けれど","ところが","一方","なぜなら",
  "思う","思った","見る","見た","いう","いった","できる","できた","なる","なった",
  "です","ます","でした","ました","ません","ない","ため","よう","場合","以上","以下","以外","について","による","において","に関して","に対して",
  "はい","そう","もう","まず","次に","最後","一つ","二つ","三つ"
];
const MIN_WORD_LEN = 2;
const NORMALIZE = {
  "参政":"参政党","参政党":"参政党",
  "立憲":"立憲民主党","立憲民主党":"立憲民主党",
  "中道":"中道改革連合","中道改革":"中道改革連合",
  "自民":"自由民主党","自民党":"自由民主党",
  "維新":"日本維新の会"
};

let boostGroups  = {};
let groupRates   = {};
let wordGroupMap = {};
const LS_KEY       = "livewords_groupRates";
const LS_FLOW_KEY  = "livewords_flowOnNetwork";

// 流れる文字ON/OFF（ネットワークON時用）
// true = 流す、false = 止める
let flowOnNetwork = (()=>{
  const s = localStorage.getItem(LS_FLOW_KEY);
  return s === null ? false : s === "true"; // デフォルト: OFF
})();

function saveFlowOnNetwork(){
  localStorage.setItem(LS_FLOW_KEY, String(flowOnNetwork));
}

function updateFlowToggleBtn(){
  const btn = document.getElementById("flowToggleBtn");
  if(flowOnNetwork){
    btn.textContent = "文字流れOFF";
    btn.classList.add("active");
  } else {
    btn.textContent = "文字流れON";
    btn.classList.remove("active");
  }
}

function toggleFlowOnNetwork(){
  flowOnNetwork = !flowOnNetwork;
  saveFlowOnNetwork();
  updateFlowToggleBtn();
}

function buildWordGroupMap(){
  wordGroupMap = {};
  Object.entries(boostGroups).forEach(([gname,gdata])=>{
    (gdata.words||[]).forEach(w=>{ wordGroupMap[w]=gname; });
  });
}

function getBoostRate(word){
  const g = wordGroupMap[word];
  if(!g) return 1;
  return groupRates[g] || 1;
}

function saveRates(){
  localStorage.setItem(LS_KEY, JSON.stringify(groupRates));
}

function loadSavedRates(){
  try { const s=localStorage.getItem(LS_KEY); if(s) return JSON.parse(s); } catch(e){}
  return null;
}

const MIN_COUNT      = 2;
const BASE_FONT_SIZE = 14;
const MAX_FONT_SIZE  = 42;
function calcFlowFontSize(weight){
  return Math.min(BASE_FONT_SIZE + Math.log1p(weight)*6.5, MAX_FONT_SIZE);
}

const FLOW_COOLDOWN_MS = 4000;
const flowLastAdded    = {};

function getMaxWords(){
  const s = document.getElementById("wordSlider");
  return s ? parseInt(s.value) : 15;
}
function onWordSliderChange(){
  document.getElementById("wordCount").textContent = document.getElementById("wordSlider").value;
  networkDirty = true;
}

let words        = {};
let edges        = {};
let flow         = [];
let mode         = "flow";
let recognition;
let running      = false;
let lastWord     = "";
let networkNodes = [];
let networkDirty = true;
let isFileMode   = false;

const canvas = document.getElementById("canvas");
const ctx    = canvas.getContext("2d");
function resize(){
  canvas.width=window.innerWidth; canvas.height=window.innerHeight; networkDirty=true;
}
resize();
window.onresize = resize;

function updateStatus(){
  const dot=document.getElementById("dot"), text=document.getElementById("statusText");
  if(running){ dot.className="active"; text.textContent="Listening..."; }
  else        { dot.className="";      text.textContent="停止中"; }
}
function updateMode(){
  const btn     = document.getElementById("toggleBtn");
  const flowBtn = document.getElementById("flowToggleBtn");
  if(mode==="flow"){
    btn.textContent="共起ネットワークON"; btn.classList.remove("active");
    flowBtn.style.display="none";
  } else {
    btn.textContent="共起ネットワークOFF"; btn.classList.add("active");
    flowBtn.style.display="";
    updateFlowToggleBtn();
  }
}

fetch("boost.json")
  .then(r=>r.json())
  .then(data=>{
    boostGroups = data.groups||{};
    const saved = loadSavedRates();
    Object.entries(boostGroups).forEach(([gname,gdata])=>{
      groupRates[gname]=(saved&&saved[gname]!=null)?saved[gname]:(gdata.rate||1);
    });
    buildWordGroupMap();
    const btn=document.getElementById("startBtn");
    btn.textContent="開始"; btn.disabled=false;
  })
  .catch(()=>{
    console.warn("boost.json が読み込めませんでした。BOOSTなしで起動します。");
    const btn=document.getElementById("startBtn");
    btn.textContent="開始"; btn.disabled=false;
  });

function start(){
  if(running) return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ alert("このブラウザは音声認識に対応していません"); return; }
  recognition=new SR();
  recognition.lang="ja-JP"; recognition.continuous=true; recognition.interimResults=true;
  running=true; updateStatus();
  recognition.onresult=(e)=>{
    let text="";
    for(let i=e.resultIndex;i<e.results.length;i++) text+=e.results[i][0].transcript;
    processText(text);
  };
  recognition.onerror=(e)=>{ console.error("recognition error:",e.error); running=false; updateStatus(); };
  recognition.onend=()=>{ setTimeout(()=>{ if(running) recognition.start(); },200); };
  recognition.start();
}
function stop(){
  running=false; if(recognition) recognition.stop(); updateStatus();
}

function splitJapanese(text){
  return text
    .replace(/[、。！？!?]/g," ")
    .replace(/(は|が|を|に|で|と|の|へ|や|ね|よ|か|な|し)/g,"$1 ")
    .replace(/(する|した|して|している|いる|いた|なる|なった|ある|あった)/g,"$1 ")
    .replace(/(ため|こと|もの|よう|場合|ところ|とき)/g," ")
    .replace(/([ぁ-んァ-ンー一-龥ａ-ｚＡ-Ｚa-zA-Z]{2,})/g,"$1 ")
    .split(/\s+/);
}

function cleanWord(word){
  word=word.replace(/(されている|されていた|してしまう|してしまった)$/,"");
  word=word.replace(/(している|していた|されている|してきた|していく)$/,"");
  word=word.replace(/(できない|できなく|できなくて)$/,"できない");
  word=word.replace(/(している|していた|してきた)$/,"");
  word=word.replace(/(する|した|して|され|しな|しに|しく|しい)$/,"");
  word=word.replace(/(なって|なった|なる|なり)$/,"");
  word=word.replace(/(あって|あった|ある|あり)$/,"");
  word=word.replace(/(いって|いった|いく|いき)$/,"");
  word=word.replace(/(くて|くない|かった|かる|ければ)$/,"い");
  word=word.replace(/(なくて|なかった|なく)$/,"ない");
  for(let i=0;i<3;i++) word=word.replace(/(が|を|は|に|で|と|も|の|へ|や|か|な|し|く|て|で)$/,"");
  return word;
}

function stemWord(word){
  word=word.replace(/なくて$/,"ない");
  word=word.replace(/して$/,"する");
  word=word.replace(/している$/,"する");
  word=word.replace(/できて$/,"できる");
  word=word.replace(/くて$/,"い");
  if(word.match(/(について|において|に対して|による|に関して)$/)) return null;
  return word;
}

function extractRepeats(word){
  for(let len=2;len<=word.length/2;len++){
    let unit=word.slice(0,len),count=0,pos=0;
    while(word.slice(pos,pos+len)===unit){ count++; pos+=len; }
    if(count>=2) return {base:unit,count:count};
  }
  return {base:word,count:1};
}

function processText(text){
  let tokens=splitJapanese(text), current=[];
  const now=Date.now();
  tokens.forEach(w=>{
    w=w.trim(); if(!w) return; if(w.length<MIN_WORD_LEN) return;
    let {base,count}=extractRepeats(w); let word=base;
    word=cleanWord(word); if(!word) return;
    word=stemWord(word);  if(!word) return;
    if(word.length<MIN_WORD_LEN) return;
    if(NORMALIZE[word]) word=NORMALIZE[word];
    if(STOP_WORDS.includes(word)) return;
    if(word===lastWord) return;
    lastWord=word;
    if(!words[word]) words[word]={count:0,weight:0,group:Math.floor(Math.random()*COLORS.length)};
    words[word].count+=count;
    words[word].weight=words[word].count*getBoostRate(word);
    current.push(word);
    const threshold=isFileMode?3:MIN_COUNT;
    if(words[word].count<threshold) return;
    const lastTime=flowLastAdded[word]||0;
    if(now-lastTime<FLOW_COOLDOWN_MS) return;
    flowLastAdded[word]=now;
    if(flow.some(f=>f.text===word)) return;
    flow.push({text:word,x:canvas.width,y:80+Math.random()*(canvas.height-120),size:calcFlowFontSize(words[word].weight),group:words[word].group,t:Math.random()*1000,opacity:0});
    if(flow.length>40) flow.shift();
    networkDirty=true;
  });
  current.forEach(a=>{ current.forEach(b=>{ if(a!==b){ let k=a+"_"+b; edges[k]=(edges[k]||0)+1; } }); });
  if(Object.keys(words).length>getMaxWords()){
    let sorted=Object.entries(words).sort((a,b)=>a[1].weight-b[1].weight);
    delete words[sorted[0][0]]; networkDirty=true;
  }
}

function buildNetworkLayout(){
  networkDirty=false;
  let keys=Object.keys(words); if(keys.length===0){ networkNodes=[]; return; }
  let sorted=[...keys].sort((a,b)=>words[b].weight-words[a].weight).slice(0,getMaxWords());
  let topCount=Math.min(3,sorted.length);
  let top=sorted.slice(0,topCount), rest=sorted.slice(topCount);
  let cx=canvas.width/2, cy=canvas.height/2, nodes=[];
  let centerSpacing=65, centerStartY=cy-(centerSpacing*(topCount-1))/2;
  top.forEach((k,i)=>{
    let w=words[k];
    nodes.push({key:k,x:cx,y:centerStartY+i*centerSpacing,size:Math.max(28,Math.min(52,18+w.weight*3.5)),group:w.group,isTop:true,rank:i});
  });
  let radius=Math.min(canvas.width,canvas.height)*0.42;
  rest.forEach((k,i)=>{
    let angle=(i/rest.length)*Math.PI*2-Math.PI/2, r=radius*(0.8+(i%3)*0.1);
    let w=words[k], nx=cx+Math.cos(angle)*r, ny=cy+Math.sin(angle)*r, margin=60;
    nx=Math.max(margin,Math.min(canvas.width-margin,nx));
    ny=Math.max(margin+60,Math.min(canvas.height-margin,ny));
    nodes.push({key:k,x:nx,y:ny,size:Math.max(10,Math.min(28,8+w.weight*1.5)),group:w.group,isTop:false,rank:topCount+i});
  });
  networkNodes=nodes;
}

function draw(){
  drawBackground();
  if(mode==="flow"){
    drawFlow();
  } else {
    if(networkDirty) buildNetworkLayout();
    if(flowOnNetwork) drawFlow(0.002);
    drawNetwork();
  }
  requestAnimationFrame(draw);
}
draw();

function drawBackground(){
  let grad=ctx.createRadialGradient(canvas.width*0.5,canvas.height*0.4,0,canvas.width*0.5,canvas.height*0.5,canvas.width*0.8);
  grad.addColorStop(0,"#0d1b2a"); grad.addColorStop(1,"#060d1a");
  ctx.fillStyle=grad; ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawFlow(alpha=1){
  const now=Date.now(), speed=parseFloat(document.getElementById("speedSlider").value)||2;
  flow.forEach((f,i)=>{
    f.opacity=Math.min(1,(f.opacity||0)+0.04);
    const targetSize=calcFlowFontSize(words[f.text]?words[f.text].weight:1);
    f.size=f.size+(targetSize-f.size)*0.02;
    ctx.globalAlpha=f.opacity*alpha;
    ctx.fillStyle=COLORS[f.group];
    ctx.font="600 "+Math.round(f.size)+"px 'Noto Sans JP', sans-serif";
    ctx.shadowColor=COLORS[f.group]; ctx.shadowBlur=18+Math.sin(now*0.002+f.t)*6;
    ctx.fillText(f.text,f.x,f.y);
    f.y+=Math.sin(now*0.0015+f.t)*0.4; f.x-=speed+f.size*0.02;
    if(f.x<-200){
      if(fileFlowPool.length>0){ f.x=canvas.width+Math.random()*200; f.y=120+Math.random()*(canvas.height-200); f.opacity=0; }
      else flow.splice(i,1);
    }
  });
  ctx.shadowBlur=0; ctx.globalAlpha=1;
}

function drawNetwork(){
  if(networkNodes.length===0) return;
  const now=Date.now();
  const topNodes=networkNodes.filter(n=>n.isTop), restNodes=networkNodes.filter(n=>!n.isTop);
  topNodes.forEach(center=>{
    restNodes.forEach(node=>{
      let s=(edges[center.key+"*"+node.key]||0)+(edges[node.key+"*"+center.key]||0);
      ctx.globalAlpha=Math.min(0.55,0.1+s*0.08);
      let grad=ctx.createLinearGradient(center.x,center.y,node.x,node.y);
      grad.addColorStop(0,COLORS[center.group]); grad.addColorStop(1,COLORS[node.group]);
      ctx.strokeStyle=grad; ctx.lineWidth=Math.max(0.5,Math.min(4,s*0.4));
      ctx.beginPath(); ctx.moveTo(center.x,center.y); ctx.lineTo(node.x,node.y); ctx.stroke();
    });
  });
  for(let i=0;i<topNodes.length;i++){
    for(let j=i+1;j<topNodes.length;j++){
      let a=topNodes[i],b=topNodes[j];
      let s=(edges[a.key+"*"+b.key]||0)+(edges[b.key+"*"+a.key]||0);
      ctx.globalAlpha=Math.min(0.4,0.15+s*0.05);
      ctx.strokeStyle="#ff5252"; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    }
  }
  ctx.globalAlpha=1;
  restNodes.forEach(node=>{
    let color=COLORS[node.group], pulse=Math.sin(now*0.001+node.rank)*3;
    ctx.fillStyle=color; ctx.font="500 "+node.size+"px 'Noto Sans JP', sans-serif";
    ctx.shadowColor=color; ctx.shadowBlur=12+pulse;
    ctx.fillText(node.key,node.x-ctx.measureText(node.key).width/2,node.y);
  });
  const centerColors=["#ff5252","#ffd740","#69f0ae"];
  topNodes.forEach((node,i)=>{
    let color=centerColors[i]||COLORS[node.group], pulse=Math.sin(now*0.0008+i*1.2)*5;
    ctx.font="900 "+node.size+"px 'Noto Sans JP', sans-serif";
    let tw=ctx.measureText(node.key).width;
    ctx.shadowColor=color; ctx.shadowBlur=40+pulse; ctx.fillStyle=color;
    ctx.fillText(node.key,node.x-tw/2,node.y);
    ctx.shadowBlur=0; ctx.globalAlpha=0.15; ctx.fillStyle="white";
    ctx.fillText(node.key,node.x-tw/2,node.y); ctx.globalAlpha=1;
  });
  ctx.shadowBlur=0;
}

let fileFlowPool=[];
function loadFile(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    const text=e.target.result; isFileMode=true; clearAll();
    const chunkSize=500;
    for(let i=0;i<text.length;i+=chunkSize){ lastWord=""; processText(text.slice(i,i+chunkSize)); }
    fileFlowPool=flow.map(f=>({...f})); mode="network"; networkDirty=true; updateMode();
  };
  reader.readAsText(file,"UTF-8"); event.target.value="";
}

function clearAll(){
  words={}; edges={}; flow=[]; fileFlowPool=[];
  networkNodes=[]; networkDirty=true; lastWord=""; isFileMode=false;
  for(const k in flowLastAdded) delete flowLastAdded[k];
}
function toggleMode(){
  mode=mode==="flow"?"network":"flow"; networkDirty=true; updateMode();
}
updateStatus(); updateMode();
function toggleControls(){
  const c=document.getElementById("controls"),btn=document.getElementById("toggleControls");
  if(c.style.display==="none"){ c.style.display="block"; btn.textContent=" 表示 "; }
  else { c.style.display="none"; btn.textContent="非表示"; }
}

// ===== 共通モーダル =====
function onOverlayClick(e,id){ if(e.target===document.getElementById(id)) closeOverlay(id); }
function closeOverlay(id){ document.getElementById(id).classList.remove("open"); }

// ===== 集計モーダル =====
const GROUP_COLORS=["#00e5ff","#69f0ae","#ffd740","#ff5252","#b388ff","#ea80fc","#ff9800","#76ff03","#40c4ff","#f48fb1"];
function openSummary(){
  const sorted=Object.entries(words).sort((a,b)=>b[1].weight-a[1].weight);
  if(sorted.length===0){
    document.getElementById("summaryTable").innerHTML='<p style="color:rgba(255,255,255,0.4);font-size:13px;padding:12px 0;">データがありません</p>';
  } else {
    let html='<table><thead><tr><th>#</th><th>ワード</th><th>出現回数</th><th>スコア</th><th>グループ</th></tr></thead><tbody>';
    sorted.forEach(([word,data],i)=>{
      const gname=wordGroupMap[word]||"";
      const gidx=gname?Object.keys(boostGroups).indexOf(gname):-1;
      const badge=gname?`<span class="boost-badge" style="background:${GROUP_COLORS[gidx%GROUP_COLORS.length]}">${gname} ×${groupRates[gname]}</span>`:"";
      html+=`<tr><td style="color:rgba(255,255,255,0.35)">${i+1}</td><td>${word}</td><td style="text-align:center">${data.count}</td><td style="text-align:center">${data.weight}</td><td>${badge}</td></tr>`;
    });
    html+='</tbody></table>';
    document.getElementById("summaryTable").innerHTML=html;
  }
  document.getElementById("summaryOverlay").classList.add("open");
}

function downloadCSV(){
  const sorted=Object.entries(words).sort((a,b)=>b[1].weight-a[1].weight);
  let csv="#,ワード,出現回数,スコア,グループ,倍率\n";
  sorted.forEach(([word,data],i)=>{
    const gname=wordGroupMap[word]||"";
    const rate=gname?(groupRates[gname]||1):"";
    csv+=`${i+1},${word},${data.count},${data.weight},${gname},${rate}\n`;
  });
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download="livewords_summary.csv"; a.click(); URL.revokeObjectURL(url);
}

// ===== 設定モーダル =====
function openSetting(){
  const groups=Object.entries(boostGroups);
  if(groups.length===0){
    document.getElementById("settingBody").innerHTML='<p style="color:rgba(255,255,255,0.4);font-size:13px;padding:12px 0;">boost.json が読み込まれていません</p>';
  } else {
    let html="";
    groups.forEach(([gname,gdata],idx)=>{
      const rate=groupRates[gname]||1, color=GROUP_COLORS[idx%GROUP_COLORS.length];
      const preview=(gdata.words||[]).slice(0,6).join("・")+((gdata.words||[]).length>6?"…":"");
      html+=`<div class="group-row">
        <div class="group-name" style="color:${color}">${gname}</div>
        <div class="group-words">${preview}</div>
        <input class="rate-input" type="number" min="1" max="10" step="0.5" value="${rate}" onchange="onRateChange('${gname}',this.value)">
        <span class="rate-label">倍</span>
      </div>`;
    });
    document.getElementById("settingBody").innerHTML=html;
  }
  document.getElementById("settingOverlay").classList.add("open");
}

function onRateChange(gname,val){
  const v=parseFloat(val); if(isNaN(v)||v<1) return;
  groupRates[gname]=v; saveRates();
  Object.entries(words).forEach(([word,data])=>{ data.weight=data.count*getBoostRate(word); });
  networkDirty=true;
}

function resetRates(){
  Object.entries(boostGroups).forEach(([gname,gdata])=>{ groupRates[gname]=gdata.rate||1; });
  saveRates();
  Object.entries(words).forEach(([word,data])=>{ data.weight=data.count*getBoostRate(word); });
  networkDirty=true; openSetting();
}
